# Packaging config (electron-builder). Run via `pnpm package` — it builds
# .build/app first (scripts/stage-resources.ts): the main process bundled to one
# ESM file plus the preload, which is the app's entire payload.
#
# Nothing else ships. The Mac app is an agent, not a server: the backend, the
# store and the SPA live in k3s (docs/multi-device-sync-briefing.md §7.3), so
# there are no extraResources, no collector deps and no native modules here.
#
# - extraMetadata.main repoints the packaged package.json at the bundle, while
#   the checked-in "main" stays src/main.ts so `pnpm start` runs the TypeScript
#   directly via Electron's type-stripping (no build step in dev).
# - asar: true is safe now that everything is one bundled .js — the old
#   asar: false existed because raw .ts and a native .node needed real files.
# - productName lives HERE only, not in package.json: Electron derives the
#   userData dir from package.json "name", so the packaged app keeps reusing
#   ~/Library/Application Support/@dash/desktop-electron (data continuity
#   between `pnpm start` and the installed .app).
# - identity: null — unsigned (local personal install; Gatekeeper only gates
#   downloaded apps). Developer-ID signing + notarization are a later step.
appId: com.tevim.personal-dashboard
productName: Personal Dashboard
electronLanguages: [de, en]
directories:
  output: .build/out
files:
  - .build/app/**
  - package.json
extraMetadata:
  main: .build/app/main.js
asar: true
npmRebuild: false
afterPack: scripts/after-pack.cjs
# Electron fuses — build-time switches burnt into the Electron binary.
#
# They matter more here than in an ordinary Electron app because the installed
# .app holds a macOS Automation (TCC) grant for MoneyMoney: macOS attaches that
# consent to *this bundle*, not to the code inside it. With the default fuses,
# anything that can run a process on this Mac can borrow the grant —
#
#   ELECTRON_RUN_AS_NODE=1 "…/Personal Dashboard.app/Contents/MacOS/Personal Dashboard" -e '<js>'
#
# — and drive Apple Events as us without ever asking the user. Disabling
# runAsNode (plus NODE_OPTIONS and --inspect, the same trick by other means)
# closes that path: the bundle can then only ever run its own main.js.
#
# - onlyLoadAppFromAsar: with the default search order (app.asar → app →
#   default_app.asar) an attacker who can delete app.asar and drop an `app/`
#   directory beside it gets code execution under the same TCC grant. This fuse
#   makes app.asar the only entry point. Cost: `asar: false` no longer produces a
#   launchable build, so the unpacked layout after-pack.cjs still tolerates is
#   debug-only — flip this off temporarily if you ever need it.
# - enableEmbeddedAsarIntegrityValidation: deliberately OFF. It compares app.asar
#   against hashes in Info.plist, but this build is unsigned (identity: null
#   above), so nothing seals that Info.plist — an attacker who can rewrite the
#   asar can rewrite the hash next to it, and the check buys ~nothing while
#   being a well-known cause of hard-to-diagnose launch failures on unsigned /
#   ad-hoc-signed apps. Turn it on together with Developer-ID signing +
#   notarization (the later step noted in the header comment).
# - resetAdHocDarwinSignature: REQUIRED here. Flipping fuses rewrites bytes in
#   the Electron Framework, which invalidates its linker-signed ad-hoc signature,
#   and arm64 macOS refuses to load a binary whose signature does not verify.
#   electron-builder normally re-signs right after flipping — but with
#   identity: null it skips signing entirely, so without this the packaged app
#   would be killed at launch. Drop it once real signing is configured.
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: false
  onlyLoadAppFromAsar: true
  resetAdHocDarwinSignature: true
mac:
  # Bundle icon (Finder/Dock of the installed .app). Master lives at
  # resources/icon/pulse-icon.svg; icon.icns is generated from Pulse.iconset via
  # `iconutil` (see resources/icon/README.md). The runtime dev Dock icon is set
  # separately in src/main.ts — the .icns only covers the packaged bundle.
  icon: resources/icon/icon.icns
  target:
    - target: dir
      arch: arm64
  identity: null
  category: public.app-category.productivity
  # Info.plist entries. electron-builder merges these into the plist it inherits
  # from the prebuilt Electron.app, then drops every key whose value is null —
  # which is the only way to get rid of Electron's own defaults.
  #
  # - NSAppleEventsUsageDescription is the key this app actually needs: without
  #   it macOS never shows the Automation consent dialog for the osascript call
  #   in packages/collector/src/sources/moneymoney.ts, and the Apple Event comes
  #   back as -1743 (the "not permitted" branch of mapOsascriptError). The text
  #   is shown verbatim in that dialog, so it is de-DE like the rest of the UI.
  # - The null entries are Electron's own stock strings ("This app needs access
  #   to the camera", …), inherited from the prebuilt Electron.app's Info.plist.
  #   This app has no camera, microphone, audio-capture or Bluetooth code;
  #   leaving them in only advertises permissions we would never ask for.
  extendInfo:
    NSAppleEventsUsageDescription: >-
      Personal Dashboard steuert MoneyMoney, um die Anzahl der noch nicht
      abgehakten Umsätze zu zählen und im Dashboard anzuzeigen. Nur diese Zahl
      verlässt MoneyMoney; es werden keine Kontodaten verändert.
    NSCameraUsageDescription: null
    NSMicrophoneUsageDescription: null
    NSAudioCaptureUsageDescription: null
    NSBluetoothAlwaysUsageDescription: null
    NSBluetoothPeripheralUsageDescription: null
