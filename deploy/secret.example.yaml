# TEMPLATE — do not commit real values, and this file is NOT applied by
# `kubectl apply -f deploy/k8s/` (it lives outside that directory on purpose).
#
# The backend reads these from the environment (secretsFromEnv); create the real
# Secret at deploy time from 1Password rather than checking values in — e.g.:
#
#   kubectl -n personal-dashboard create secret generic dashboard-secrets \
#     --from-literal=FASTMAIL_TOKEN_PERSONAL="$(op read 'op://Private/Fastmail personal/token')" \
#     --from-literal=FASTMAIL_TOKEN_WORK="$(op read 'op://Private/Fastmail work/token')" \
#     --from-literal=TOGGL_API_TOKEN="$(op read 'op://Private/Toggl/token')" \
#     --from-literal=TOGGL_WORKSPACE_ID="1234567"
#
# MONEYMONEY_ACCOUNT is deliberately absent: MoneyMoney runs only on the Mac
# agent, never in the cluster.
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-secrets
  namespace: personal-dashboard
type: Opaque
stringData:
  FASTMAIL_TOKEN_PERSONAL: "REPLACE_ME"
  FASTMAIL_TOKEN_WORK: "REPLACE_ME"
  TOGGL_API_TOKEN: "REPLACE_ME"
  TOGGL_WORKSPACE_ID: "REPLACE_ME"
