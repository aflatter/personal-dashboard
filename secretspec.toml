# SecretSpec — declares the secrets the collector needs. The collector loads them
# in-process at boot via the `secretspec` Node SDK (packages/collector/src/secrets.ts),
# so nothing else touches the vault.
#
# One-time setup: `secretspec config` → choose the onepassword provider and point
# it at the project vault. Create a 1Password item per secret name below. Override
# ad hoc with SECRETSPEC_PROVIDER / SECRETSPEC_PROFILE env vars (e.g. `env` in CI).
#
# All optional: a missing secret (or an unavailable provider) just means that
# source is skipped — the collector keeps serving its last-known / seeded state.
# MoneyMoney needs no secret — it is opt-in via MONEYMONEY=1 (local AppleScript +
# macOS Automation permission).

[project]
name = "personal-dashboard"
revision = "1.0"

[providers]
1password_vault = "onepassword://3HBLAKHC7NCG7KVQHTNPRWTMR4@Personal%20Dashboard"

[profiles.default]
FASTMAIL_TOKEN_PERSONAL = { description = "Fastmail JMAP API token — personal account", required = false }
FASTMAIL_TOKEN_WORK = { description = "Fastmail JMAP API token — work (tevim) account", required = false }
TOGGL_API_TOKEN = { description = "Toggl Track API token", required = false }
TOGGL_WORKSPACE_ID = { description = "Toggl workspace id", required = false }

[profiles.default.defaults]
providers = ["1password_vault"]
required = true
