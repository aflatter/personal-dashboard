# SecretSpec — declares the secrets the collector needs. Resolved from a provider
# (1Password) at launch and injected as env vars:
#
#   secretspec config                                  # once: choose the onepassword provider
#   secretspec run -- node packages/collector/src/main.ts
#
# All optional: a missing secret just means that source is skipped (the collector
# keeps serving its last-known / seeded state). MoneyMoney needs no secret — it is
# opt-in via the MONEYMONEY=1 env var (local AppleScript + macOS Automation perm).
#
# VERIFY the exact schema against https://secretspec.dev — field names may differ.

[project]
name = "personal-dashboard"
revision = "1.0"

[profiles.default]
FASTMAIL_TOKEN_PERSONAL = { description = "Fastmail JMAP API token — personal account", required = false }
FASTMAIL_TOKEN_WORK = { description = "Fastmail JMAP API token — work (tevim) account", required = false }
TOGGL_API_TOKEN = { description = "Toggl Track API token", required = false }
TOGGL_WORKSPACE_ID = { description = "Toggl workspace id", required = false }
