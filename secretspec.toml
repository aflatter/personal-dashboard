# SecretSpec — declares the secrets the collector needs. The collector loads them
# in-process at boot via the `secretspec` Node SDK (packages/collector/src/secrets.ts),
# so nothing else touches the vault.
#
# One-time setup: `secretspec config` → choose the onepassword provider and point
# it at the project vault. Create a 1Password item per secret name below. Override
# ad hoc with SECRETSPEC_PROVIDER / SECRETSPEC_PROFILE env vars (e.g. `env` in CI).
#
# The tokens are optional: a missing one (or an unavailable provider) just means
# that source is skipped — the collector keeps serving its last-known / seeded
# state. MoneyMoney needs no auth secret — it is opt-in via macOS Automation
# permission. MONEYMONEY_ACCOUNT is not auth: it just names which account to read.
# It is required (not hardcoded) because the account key is a personal detail; an
# IBAN is preferred — unique + stable, unlike the account name, which MoneyMoney
# does not guarantee unique. Point secretspec at the `env` provider to source it
# from the environment instead of the vault.

[project]
name = "personal-dashboard"
revision = "1.0"

[providers]
1password_vault = "onepassword://3HBLAKHC7NCG7KVQHTNPRWTMR4@Personal%20Dashboard"

# Secrets used by the Electron app
[profiles.app]
MONEYMONEY_ACCOUNT = { description = "MoneyMoney account selector — IBAN preferred (UUID/IBAN/account number/name/group all accepted)" }

[profiles.app.defaults]
providers = ["1password_vault"]
required = true

# Runtime credentials (backend)
[profiles.backend]
FASTMAIL_TOKEN_PERSONAL = { description = "Fastmail JMAP API token — personal account", required = true }
FASTMAIL_TOKEN_WORK = { description = "Fastmail JMAP API token — work (tevim) account", required = true }
TOGGL_API_TOKEN = { description = "Toggl Track API token", required = true }
TOGGL_WORKSPACE_ID = { description = "Toggl workspace id", required = true }

[profiles.backend.defaults]
providers = ["1password_vault"]
required = true

# Deploy-time credentials — NOT loaded by the collector. Kept in their own
# profile so the runtime load (`default`, see secrets.ts) never resolves them:
# the registry token is only ever needed by `just secrets` when it builds the
# cluster's image-pull Secret. MONEYMONEY_ACCOUNT is deliberately absent from
# the cluster's secret set — MoneyMoney runs only on the Mac agent.
[profiles.deploy]
FORGEJO_REGISTRY_TOKEN = { description = "Forgejo access token (scope: read:package) — k8s pulls the backend image with it" }

[profiles.deploy.defaults]
providers = ["1password_vault"]
required = true
